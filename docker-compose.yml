services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/initdb:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data

  # optional local LLM runtime
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  api:
    build: ./api
    env_file: .env
    depends_on: [postgres, redis]
    ports: ["8000:8000"]
    volumes:
      - ./api:/app

  web:
    build: ./web
    env_file: .env
    depends_on: [api]
    ports: ["3000:3000"]
    volumes:
      - ./web:/app

  nginx:
    image: nginx:1.27
    depends_on: [web, api]
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports: ["80:80"]

volumes:
  pg_data:
  redis_data:
  ollama_data: